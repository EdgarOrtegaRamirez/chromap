name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Download deps
        run: go mod download || true

      - name: Run tests
        run: go test -v -cover ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o chromap ./cmd/chromap